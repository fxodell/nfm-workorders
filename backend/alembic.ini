# Alembic configuration for CMMS backend
#
# Database URL is constructed from individual environment variables so that
# credentials are never hard-coded.  Override via DB_USER, DB_PASS, DB_HOST,
# DB_PORT, and DB_NAME environment variables, or set DATABASE_URL directly
# and use env.py's override logic.

[alembic]
script_location = alembic
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Template used for Alembic migration file generation.
prepend_sys_path = .
timezone = utc

# Default database URL (env.py can override this entirely).
sqlalchemy.url = postgresql://%(DB_USER)s:%(DB_PASS)s@%(DB_HOST)s:%(DB_PORT)s/%(DB_NAME)s

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
